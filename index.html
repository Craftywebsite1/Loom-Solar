<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #39FF14; background: black;">
        <div id="loading-status">Loading Loom Solar...</div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var status = document.getElementById('loading-status');
        if (status) {
          status.innerHTML = '<div style="color: #ff4444; text-align: left; max-width: 80vw; overflow: auto;">' +
            '<strong>Error detected:</strong><br>' + msg + '<br>' +
            '<small>' + url + ' line ' + lineNo + '</small>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
